version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
