name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v4
        with:
          languages: go

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
