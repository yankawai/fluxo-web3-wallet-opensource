name: Bug report
description: Report a reproducible defect in the wallet core.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include mnemonics, private keys, passwords, vault plaintext, or production secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, inputs, or test case that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA, tag, or branch.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, OS, architecture, and integration surface.
    validations:
      required: true
