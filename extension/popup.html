<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fluxo Web3 Wallet</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <p class="eyebrow">fluxo wallet</p>
          <h1>Fluxo Web3 Wallet</h1>
        </div>
        <span id="status" class="status">loading</span>
      </header>

      <section id="setupView" class="panel hidden">
        <label>
          Vault password
          <input id="setupPassword" type="password" autocomplete="new-password" minlength="12" placeholder="12+ characters">
        </label>
        <button id="createWallet" type="button">Create encrypted wallet</button>
        <p class="hint">The private key is generated and encrypted inside the Go WASM core before local storage.</p>
      </section>

      <section id="lockedView" class="panel hidden">
        <div class="address-block">
          <span>Address</span>
          <code id="lockedAddress">-</code>
        </div>
        <p id="vaultMeta" class="hint">-</p>
        <label>
          Vault password
          <input id="unlockPassword" type="password" autocomplete="current-password" placeholder="Unlock locally">
        </label>
        <button id="unlockWallet" type="button">Unlock</button>
      </section>

      <section id="walletView" class="panel hidden">
        <div class="address-block">
          <span>Address</span>
          <code id="walletAddress">-</code>
        </div>
        <button id="copyAddress" class="secondary" type="button">Copy address</button>

        <label>
          Message
          <textarea id="message" rows="4" placeholder="Message to sign"></textarea>
        </label>
        <button id="signMessage" type="button">Sign message</button>

        <label>
          Signature
          <textarea id="signature" rows="5" readonly></textarea>
        </label>
        <div class="row">
          <button id="copySignature" class="secondary" type="button">Copy signature</button>
          <button id="lockWallet" class="secondary" type="button">Lock</button>
        </div>
      </section>

      <section class="danger-zone">
        <button id="resetWallet" class="danger" type="button">Reset local vault</button>
      </section>
    </main>

    <script src="wasm_exec.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
